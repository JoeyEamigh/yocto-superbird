# zRAM is the only swap on this device - eMMC swap is intentionally
# absent. eMMC writes are slow and the part is not designed for the
# wear pattern of a swap file.
#
# Tuning:
#   swappiness = 10    keep chromium's anon heap resident; let the
#                      kernel evict file cache (which is clean and
#                      can be re-read from squashfs) before paging
#                      anon pages out to zram. The opposite policy
#                      (swappiness = 180) measurably thrashed the
#                      anon set on this device under tap load -
#                      ~240 swap-ins/sec, ~235 swap-outs/sec - with
#                      no improvement to perceived latency.
#   page-cluster = 0   read one page at a time. zRAM is fast and has
#                      no spinning-disk seek penalty, so batching
#                      reads only adds latency.
#   watermark_scale_factor = 50
#                      moderate reserve. The aggressive 125 setting
#                      kept kswapd permanently active, scanning
#                      thousands of pages per tick even at idle and
#                      pre-evicting pages about to be touched again.
#                      The kernel default 10 was too lax for cold
#                      boot: under chromium's launch fault storm,
#                      kswapd fell behind, the network-service
#                      utility's Mojo IPC timed out, and chromium's
#                      tab landed on about:blank with no in-process
#                      retry. 50 keeps a small free reserve without
#                      thrashing kswapd at idle.
vm.swappiness = 10
vm.page-cluster = 0
vm.watermark_boost_factor = 0
vm.watermark_scale_factor = 50

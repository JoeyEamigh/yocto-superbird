# zRAM is the only swap on this device - eMMC swap is intentionally
# absent. eMMC writes are slow and the part is not designed for the
# wear pattern of a swap file.
#
# Tuning:
#   swappiness = 180   modern recommendation when zRAM is the swap
#                      target - favors swapping over evicting page
#                      cache, since compressed RAM is faster than
#                      re-reading from eMMC.
#   page-cluster = 0   read one page at a time. zRAM is fast and has
#                      no spinning-disk seek penalty, so batching
#                      reads only adds latency.
vm.swappiness = 180
vm.page-cluster = 0
vm.watermark_boost_factor = 0
vm.watermark_scale_factor = 125

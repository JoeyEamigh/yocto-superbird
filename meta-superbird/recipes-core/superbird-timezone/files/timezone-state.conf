[Service]
# /etc is read-only squashfs; systemd-timedated cannot rename(2) into
# it. SYSTEMD_ETC_LOCALTIME redirects both the read and the atomic
# rewrite of the timezone symlink to the writable settings partition.
# /etc/localtime ships as a relative symlink into the same path so
# glibc's localtime(3) sees a consistent view.
Environment=SYSTEMD_ETC_LOCALTIME=/var/lib/timezone/localtime
ReadWritePaths=/var/lib/timezone

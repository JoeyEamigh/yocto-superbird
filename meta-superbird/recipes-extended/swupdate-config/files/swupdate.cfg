# swupdate runtime config. Pairs with /etc/fw_env.config so the
# bootloader handler can flip active_slot via libubootenv after a
# successful install.

globals:
{
    bootloader = "uboot";
    public-key-file = "";
    no-downgrade-check = true;
    syslog = true;
};

uboot:
{
    fwenv = "/etc/fw_env.config";
};

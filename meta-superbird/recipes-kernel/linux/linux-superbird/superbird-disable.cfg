# Superbird kconfig negation fragment - strips defconfig drift.
#
# arm64 defconfig enables every ARM64 SoC family known to the upstream kernel
# (Apple, Qualcomm, MediaTek, Tegra, Rockchip, etc.) plus a server-class
# ARM stack (NUMA, ACPI, SMMU, GIC-ITS) plus a full ChromeOS-laptop firmware
# tree (CROS_EC, GOOGLE_FIRMWARE). The Car Thing is a UMA Amlogic G12A with
# DT-only boot, no PCIe, no radios, no battery, eMMC-only storage.
#
# Disabling the ARCH_* gates lets kconfig drop everything that "depends on"
# them automatically. Where a driver chain is enabled outside an ARCH_* gate
# (foreign WiFi/BT, server bits, ACPI, virt, defconfig touchscreens etc.) we
# negate the parent symbol directly and let kconfig prune the children.


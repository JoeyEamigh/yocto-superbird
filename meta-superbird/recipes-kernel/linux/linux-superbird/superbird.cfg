# Superbird kconfig fragment - merged on top of in-tree arch/arm64/configs/defconfig.

# Module loading. Most of the appliance stack is =y so the rootfs has no
# kernel-module-* RDEPENDS for the boot path, but a few large drivers are
# only useful at runtime (v4l2 hardware accel, hypothetical accessories)
# and adding them to vmlinuz is what pushes us past the 16 MiB boot_a
# partition cap. Enable module support so those can ship as .ko under
# /lib/modules on the squashfs rootfs and load on first use via udev.
CONFIG_MODULES=y
CONFIG_MODULE_UNLOAD=y

# Pin the kernel localversion to a static "-superbird" suffix. The arm64
# defconfig sets CONFIG_LOCALVERSION_AUTO=y, which makes scripts/setlocalversion
# run scm_version against the unpacked git tree; the patches applied at
# do_patch leave that tree dirty and the suffix becomes "-dirty". Disable the
# auto path and supply a static suffix so uname -r reads "<KERNELVERSION>-superbird"
# regardless of build-tree state.
# CONFIG_LOCALVERSION_AUTO is not set
CONFIG_LOCALVERSION="-superbird"

# USB gadget: bake the composite stack in so the image can bring up usb0 at
# boot without shipping .ko files. defconfig has these as =m; =y keeps the
# rootfs side trivial (no modprobe ordering, no kernel-module-* packaging).
# F_FS is the userspace-driven function (FunctionFS) that adbd uses to
# expose its bulk endpoints via /dev/usb-ffs/adb.
CONFIG_USB_LIBCOMPOSITE=y
CONFIG_USB_CONFIGFS=y
CONFIG_USB_F_ACM=y
CONFIG_USB_F_ECM=y
CONFIG_USB_F_EEM=y
CONFIG_USB_F_RNDIS=y
CONFIG_USB_F_FS=y
CONFIG_USB_F_MASS_STORAGE=y

# (CONFIG_BRIDGE not needed - the USB-gadget RNDIS + CDC-ECM functions
# are on separate /24 subnets so the kernel routing table picks the
# right interface per destination IP without any L2 bridge.)

# Display pipeline: Amlogic meson-drm CRTC + DW-MIPI-DSI encoder + ST7701S
# panel. Built-in so the modeset comes up on boot without module ordering.
CONFIG_DRM_MESON=y
CONFIG_DRM_MESON_DW_HDMI=y
CONFIG_DRM_MESON_DW_MIPI_DSI=y
CONFIG_DRM_PANEL_SITRONIX_ST7701=y

# pwm-backlight for the LCD brightness, driven by pwm_ef on PWM_F (GPIOH_5).
CONFIG_PWM_MESON=y
CONFIG_BACKLIGHT_CLASS_DEVICE=y
CONFIG_BACKLIGHT_PWM=y

# MIPI DPHY for DW-MIPI-DSI. Without these the DSI host defers probe forever
# waiting for its phy binding.
CONFIG_PHY_MESON_AXG_MIPI_DPHY=y
CONFIG_PHY_MESON_G12A_MIPI_DPHY_ANALOG=y

# Bootloader handoff: u-boot brings the panel up cleanly and the kernel cannot
# reproduce that init sequence (different gp0_pll lock transient + AXG-DPHY
# vendor calibration we haven't fully reversed). The ONLY working strategy is
# "kernel never touches the panel after boot." Disable everything that would
# trigger an in-kernel modeset, fbdev autoblank, or fbcon attach:
#   - DRM_FBDEV_EMULATION: drm_client_setup() registers an fbdev client that
#     auto-modesets at probe and DPMS-off auto-blanks if nothing draws. Both
#     paths fire panel.disable -> drm_panel_disable -> SLPIN, which corrupts
#     the panel state. With this off, drm_client_setup is a no-op stub.
#   - FRAMEBUFFER_CONSOLE / LOGO: fbcon attaches to fbdev, scribbles on it.
#     LOGO would briefly paint the Tux on top of the splash.
# These mirror Spotify's vendor superbird_evt_defconfig negative list.
# CONFIG_DRM_FBDEV_EMULATION is not set
# CONFIG_DRM_FBDEV_DMA is not set
# CONFIG_FRAMEBUFFER_CONSOLE is not set
# CONFIG_LOGO is not set

# Allow /dev/mem to map physical pages outside the kernel's RAM map
# (specifically the logo_reserved framebuffer pool at 0x1f800000). This
# is a development-image convenience: a userspace test-pattern writer
# uses /dev/mem mmap to draw straight into u-boot's framebuffer while
# the OSD plane is still scanning it. STRICT_DEVMEM=y would block that.
# Lock back down for production.
# CONFIG_STRICT_DEVMEM is not set

# Input devices: front-panel button cluster (polled) + scroll wheel rotary
# encoder. evdev is the userspace ABI (/dev/input/event*). uinput exposes
# /dev/uinput so userspace tools (ydotool, automation harnesses) can synthesize
# input events into the same input core that the real devices feed.
CONFIG_INPUT_EVDEV=y
CONFIG_INPUT_UINPUT=y
CONFIG_KEYBOARD_GPIO_POLLED=y
CONFIG_INPUT_GPIO_ROTARY_ENCODER=y

# Ambient light sensor on i2c-2 / 0x39 (TMD2772). Exposed via IIO.
CONFIG_TSL2772=y

# Bluetooth: BCM20703A2 over UART (uart_A). We use userspace btattach
# rather than the serdev/hci_bcm auto-bind path - the same chip works on
# stock + nixos via btattach but the serdev path hits a ReadLocalVersion
# timeout after Reset that we couldn't root-cause cheaply. BT_HCIUART
# (the line-discipline driver btattach plugs into), BT_HCIUART_BCM (the
# Broadcom-specific protocol), and BT_BCM (firmware patchram) are =y so
# the chain is built-in. The subver 0x220b -> BCM20703A2 mapping (our
# 0002 patch) still applies because btbcm_setup_patchram runs the same
# code path either way. CONFIG_SERIAL_DEV_BUS stays =y because mainline
# meson-uart needs it for serdev consumers in general (none here, but it
# costs nothing and keeps options open).
CONFIG_BT=y
CONFIG_BT_BREDR=y
CONFIG_BT_LE=y
CONFIG_BT_HCIUART=y
CONFIG_BT_HCIUART_H4=y
CONFIG_BT_HCIUART_BCM=y
CONFIG_BT_HCIUART_SERDEV=y
CONFIG_BT_BCM=y
# RFCOMM transport - bridgething's native gateway and the iAP2 profile
# both register Profile1 over RFCOMM. arm64 defconfig leaves this off,
# which makes bluetoothd's RFCOMM listener fail with ENOPROTOOPT and
# the corresponding Profile1 UUIDs never make it onto the adapter.
CONFIG_BT_RFCOMM=y
CONFIG_SERIAL_DEV_BUS=y
CONFIG_SERIAL_DEV_CTRL_TTYPORT=y
CONFIG_RFKILL=y

# GPIO character device - userspace bring-up of GPIOX_17 (BT chip enable)
# uses libgpiod which talks to /dev/gpiochipN. CONFIG_GPIO_SYSFS is the
# deprecated alternative; chardev is the supported path.
CONFIG_GPIO_CDEV=y

# Amlogic efuse - exposes per-device read-only OTP at
# /sys/bus/nvmem/devices/efuse0/nvmem. Holds BT MAC at offset 6 (6 bytes)
# and ASCII serial number at offset 18 (12 bytes), per Spotify's stock
# efuse layout (matches nixos-superbird's hexdump scheme). Bus driver
# uses the secure-monitor backend already enabled in meson-g12-common.
CONFIG_NVMEM_MESON_EFUSE=y

# Touchscreen: TLSC6X capacitive controller on i2c0/0x2e. Mainline driver
# added by our 0006 patch (ported from Spotify's GPL kernel release).
CONFIG_TOUCHSCREEN_TLSC6X=y

# Audio stack: AXG sound card + on-chip T9015 DAC + 4-mic PDM array.
# AXG_SOUND_CARD selects the TDM interface and implies the FRDDR/TODDR/
# TDMIN/TDMOUT/PDM/TOACODEC frontends, but we still need the codec
# drivers themselves built in (the imply chain leaves them as modules
# in defconfig). =y everywhere so the card registers without modprobe.
CONFIG_SND_MESON_AXG_SOUND_CARD=y
CONFIG_SND_MESON_AXG_FRDDR=y
CONFIG_SND_MESON_AXG_TODDR=y
CONFIG_SND_MESON_AXG_TDMIN=y
CONFIG_SND_MESON_AXG_TDMOUT=y
CONFIG_SND_MESON_AXG_PDM=y
CONFIG_SND_MESON_G12A_TOACODEC=y
CONFIG_SND_SOC_MESON_T9015=y
CONFIG_SND_SOC_DMIC=y

# Amlogic GE2D 2D graphics accelerator. Exposes a v4l2-m2m device
# (/dev/videoN) for color conversion, scaling, BitBLT and alpha blends.
# Useful as a CPU-cheap pixel-pump alongside Panfrost - weston and
# gstreamer can offload format conversions and composition through it.
# Built as a module so it ships under /lib/modules on the rootfs (it
# pushes vmlinuz past boot_a's 16 MiB cap if linked in); udev autoloads
# it when the DT node is bound.
CONFIG_VIDEO_MESON_GE2D=m

# ZRAM compressed swap. With 512 MiB physical RAM, every browser tab and
# weston layer competes for space; a zram device backed by the LZ4
# backend gives ~2-3x effective memory at single-digit % CPU cost on
# Cortex-A53. zsmalloc is the storage allocator. Userspace setup comes
# from the meta-oe `zram` recipe (zram-swap.service auto-creates a
# device sized to the available RAM at boot).
CONFIG_ZRAM=y
CONFIG_ZSMALLOC=y
CONFIG_ZRAM_BACKEND_LZ4=y
CONFIG_ZRAM_DEF_COMP_LZ4=y

# ---------------------------------------------------------------------------
# All-in policy for the modules our hardware actually uses.
#
# arm64 defconfig leaves the meson-drm / panfrost / v4l2 / fuse / ipv6
# subsystems as =m. Shipping them as out-of-vmlinuz .ko files means an
# RDEPENDS list of kernel-module-* in the rootfs packagegroup, modprobe
# ordering at boot, and an extra ~MB of duplicated metadata on disk.
# We need every one of these built-in for the appliance, so promote
# them here and drop the packagegroup list. Defconfig drift can flip a
# select chain back to =m, so each leaf used by a real driver is pinned
# explicit rather than trusting the upstream select graph.
# ---------------------------------------------------------------------------

# DRM core + Panfrost (Mali-G31 GPU). DRM_MESON is already =y above;
# adding the helpers + Panfrost so the entire graphics stack is built-in.
CONFIG_DRM=y
CONFIG_DRM_KMS_HELPER=y
CONFIG_DRM_DISPLAY_HELPER=y
CONFIG_DRM_GEM_DMA_HELPER=y
CONFIG_DRM_GEM_SHMEM_HELPER=y
CONFIG_DRM_MIPI_DBI=y
CONFIG_DRM_DW_MIPI_DSI=y
CONFIG_DRM_PANFROST=y
CONFIG_DRM_SCHED=y

# CEC core sits behind DRM_MESON_DW_HDMI; built-in so the HDMI block
# doesn't need a module load if a future accessory exposes it.
CONFIG_MEDIA_CEC_SUPPORT=y
CONFIG_CEC_CORE=y

# V4L2 / videobuf2 stack - the substrate GE2D and any future hardware
# video decoder land on. Chrome's VA-V4L2 backend probes /dev/video* at
# startup, so the nodes must exist before chromium-kiosk runs.
CONFIG_MEDIA_SUPPORT=y
CONFIG_MEDIA_CONTROLLER=y
CONFIG_MEDIA_PLATFORM_SUPPORT=y
CONFIG_VIDEO_DEV=y
CONFIG_V4L2_MEM2MEM_DEV=y
CONFIG_VIDEOBUF2_CORE=y
CONFIG_VIDEOBUF2_DMA_CONTIG=y
CONFIG_VIDEOBUF2_MEMOPS=y
CONFIG_VIDEOBUF2_V4L2=y

# Hardware video decode - staging-tree driver, the only path to
# h.264/h.265 hardware decode on this SoC. Built as a module so it
# ships under /lib/modules on the rootfs (it pushes vmlinuz past
# boot_a's 16 MiB cap if linked in); udev autoloads it when the DT
# node is bound. chromium's VA-V4L2 backend probes /dev/video* at
# startup, so the module needs to load before the kiosk service - which
# happens naturally because chromium starts after multi-user.target.
CONFIG_VIDEO_MESON_VDEC=m

# Filesystems: FUSE for sshfs/userspace mounts, overlayfs for the
# read-only rootfs + writable upper.
CONFIG_FUSE_FS=y
CONFIG_OVERLAY_FS=y

# squashfs is the rootfs format. LZ4 compression at the lz4-hc encoder
# setting decompresses at ~1.5-2 GB/s on Cortex-A53 - 3-4x faster than
# zstd at any level - which is what dominates user-perceived stalls
# under memory pressure (every evicted code page costs a squashfs
# fault-in). lz4-hc is wire-compatible with the standard lz4 stream
# format, so the same kernel decompressor handles both.
#
# COMPILE_DECOMP_MULTI_PERCPU is the load-bearing fix for fault-in
# parallelism: without it, the choice resolver falls back to
# COMPILE_DECOMP_SINGLE and every squashfs fault serializes through
# one decompression worker even on a 4-core SoC. Set BOTH the unset
# of SINGLE and the y of MULTI_PERCPU so merge_config picks ours
# unambiguously over the choice's default.
#
# FILE_DIRECT decompresses straight into the page cache (better than
# FILE_CACHE for the big chromium binary's large random-access reads).
# XATTR keeps SELinux/POSIX xattrs intact from the build rootfs. ZSTD
# stays =y for OTA backwards compat: a device with a zstd squashfs in
# its inactive slot must still be able to roll back into it after a
# kernel-only OTA. Drop ZSTD once both slots have been cycled to lz4.
CONFIG_SQUASHFS=y
CONFIG_SQUASHFS_LZ4=y
CONFIG_SQUASHFS_ZSTD=y
CONFIG_SQUASHFS_FILE_DIRECT=y
# CONFIG_SQUASHFS_COMPILE_DECOMP_SINGLE is not set
CONFIG_SQUASHFS_COMPILE_DECOMP_MULTI_PERCPU=y
CONFIG_SQUASHFS_DECOMP_MULTI_PERCPU=y
CONFIG_SQUASHFS_XATTR=y

# Pressure Stall Information - per-resource (cpu/memory/io) wait
# accounting exposed at /proc/pressure/{cpu,memory,io}. The kernel's
# native answer to "is this stall caused by lack of CPU, lack of
# memory, or waiting on I/O" - much better than inferring from
# vmstat deltas + iowait%. Cost is single-digit % on modern kernels
# and zero unless a process is blocked on the resource. PSI=y +
# PSI_DEFAULT_DISABLED=n makes it on at boot without a psi=1
# cmdline arg.
CONFIG_PSI=y
# CONFIG_PSI_DEFAULT_DISABLED is not set

# IPv6 - service discovery (mDNS), modern toolchains, and at least one
# bridgething plugin path expect it. The ~50 KB savings of disabling it
# is not worth the surprise breakage.
CONFIG_IPV6=y

# Device tree runtime overlays - bridgething uses them for plugin-style
# hardware customization at boot.
CONFIG_OF_OVERLAY=y

# Watchdog. bridgething pets /dev/watchdog so a wedged daemon resets
# the board instead of bricking it.
CONFIG_MESON_GXBB_WATCHDOG=y

# Crypto userspace API. openssl / libcrypto reach AF_ALG sockets when
# offload paths exist; without it they fall back silently to CPU.
CONFIG_CRYPTO_USER_API=y
CONFIG_CRYPTO_USER_API_HASH=y
CONFIG_CRYPTO_USER_API_SKCIPHER=y
CONFIG_CRYPTO_USER_API_RNG=y
CONFIG_CRYPTO_USER_API_AEAD=y

# Amlogic SoC plumbing - clock, reset, canvas, DDR PMU, vRTC, MDIO mux.
# These are select-pulled by the drivers above but pinned explicit so
# that future defconfig changes can't quietly demote them.
CONFIG_COMMON_CLK_AXG_AUDIO=y
CONFIG_RESET_MESON_AUDIO_ARB=y
CONFIG_RESET_MESON_AUX=y
CONFIG_MESON_CANVAS=y
CONFIG_MESON_DDR_PMU=y
CONFIG_RTC_DRV_MESON_VRTC=y
CONFIG_MDIO_BUS_MUX_MESON_G12A=y

# ALSA stack - sound card recipe is already =y above; pinning the core
# infrastructure so the entire audio path is in vmlinuz.
CONFIG_SOUND=y
CONFIG_SND=y
CONFIG_SND_PCM=y
CONFIG_SND_TIMER=y
CONFIG_SND_DMAENGINE_PCM=y
CONFIG_SND_COMPRESS_OFFLOAD=y
CONFIG_SND_SOC=y
CONFIG_SND_MESON_AXG_FIFO=y
CONFIG_SND_MESON_AXG_TDM_FORMATTER=y
CONFIG_SND_MESON_AXG_TDM_INTERFACE=y
CONFIG_SND_MESON_CARD_UTILS=y
CONFIG_SND_MESON_CODEC_GLUE=y

# CPU DVFS: drive VDDCPU via pwm-regulator on pwm_AO_cd. Without this, the
# vddcpu node added to meson-g12a-superbird.dts cannot bind, cpufreq-dt
# silently runs without voltage scaling, and the higher OPPs in the g12a
# table are unsafe to step into. Pin CPU_FREQ + CPUFREQ_DT explicitly so
# the build never drops them if defconfig changes upstream.
CONFIG_REGULATOR_PWM=y
CONFIG_CPU_FREQ=y
CONFIG_CPU_FREQ_GOV_PERFORMANCE=y
CONFIG_CPU_FREQ_GOV_ONDEMAND=y
CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y
CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=y
CONFIG_CPUFREQ_DT=y

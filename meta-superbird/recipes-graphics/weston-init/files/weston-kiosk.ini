[core]
backend=drm-backend.so
shell=desktop-shell.so
modules=cursor-suppress.so
idle-time=0
require-input=false

[shell]
background-image=/usr/share/superbird/splash.png
background-type=centered
background-color=0xff000000
panel-position=none
locking=false
animation=none
startup-animation=none
focus-animation=none
cursor-theme=blank

[input-method]
path=/usr/libexec/weston-keyboard

[output]
name=DSI-1
mode=480x800@60
transform=rotate-270

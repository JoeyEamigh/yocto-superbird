<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  cast_shell has no built-in emoji font; it resolves emoji glyphs through the
  system fontconfig via Blink's per-character fallback (FcFontSort for the
  codepoint). With no color font registered every emoji renders as tofu.

  Register "Noto Color Emoji" as the generic 'emoji' family and append it to
  the three standard families. mode="append" keeps it AFTER the real Latin
  fonts, so body text is unaffected and only codepoints the primary font
  cannot cover (i.e. emoji) fall through to it.
-->
<fontconfig>
  <alias binding="same">
    <family>emoji</family>
    <prefer>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <match target="pattern">
    <test name="family">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="append">
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>serif</string>
    </test>
    <edit name="family" mode="append">
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>monospace</string>
    </test>
    <edit name="family" mode="append">
      <string>Noto Color Emoji</string>
    </edit>
  </match>
</fontconfig>

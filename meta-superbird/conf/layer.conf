BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "superbird"
BBFILE_PATTERN_superbird = "^${LAYERDIR}/"
BBFILE_PRIORITY_superbird = "10"

LAYERSERIES_COMPAT_superbird = "scarthgap wrynose"

# meta-meson tracks Yocto codenames on its own cadence; its own
# layer.conf advertises only the codenames it has explicitly tested,
# which historically lags poky by ~6 months. Append wrynose locally
# so its layer.conf passes parsing on a wrynose-targeted poky tip.
# Drop this override once meta-meson upstream lists wrynose.
LAYERSERIES_COMPAT_meson:append = " wrynose"

LAYERDEPENDS_superbird = "core meson chromium-browser-layer"

# Capture the layer root so the flashthing image class can find
# helper scripts shipped alongside the class itself.
SUPERBIRD_LAYERDIR := "${LAYERDIR}"

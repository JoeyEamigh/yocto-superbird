#@TYPE: Machine
#@NAME: Spotify Car Thing (Superbird)
#@DESCRIPTION: Mainline-kernel Car Thing - Amlogic S905D2 (G12A family)

require conf/machine/include/amlogic-s905d2.inc

PREFERRED_PROVIDER_virtual/kernel = "linux-superbird"

# superbird-uboot and oe-core's stock u-boot both PROVIDE virtual/bootloader;
# pin ours so any virtual/bootloader dependency resolves unambiguously.
PREFERRED_PROVIDER_virtual/bootloader = "superbird-uboot"

KERNEL_IMAGETYPE = "Image.gz"

KERNEL_DEVICETREE = "amlogic/meson-g12a-superbird.dtb"

# Boot files for the mainline-u-boot extlinux path. wic's bootimg-partition
# plugin copies these onto the FAT boot_a partition; kernel, DTB and the
# extlinux config all sit under /extlinux/ so the relative KERNEL/FDT paths
# inside extlinux.conf resolve against the config's own directory. DTB
# basename is hardcoded (single board).
IMAGE_BOOT_FILES = "Image.gz;extlinux/Image.gz meson-g12a-superbird.dtb;extlinux/meson-g12a-superbird.dtb extlinux.conf;extlinux/extlinux.conf"

SERIAL_CONSOLES = "115200;ttyAML0"

MACHINE_FEATURES = "alsa bluetooth ext2 screen usbgadget usbhost vfat"

# Static device facts. Surfaced into /etc/superbird at build time by
# the bridgething-init recipe so the daemon can publish them to the
# gateway. Values are the Spotify Car Thing's certification IDs and
# internal model name.
SUPERBIRD_FCC_ID = "2AP3D"
SUPERBIRD_IC_ID = "24262"
SUPERBIRD_MODEL_NAME = "YX5H6679"
SUPERBIRD_DESCRIPTION = "Spotify Car Thing (Superbird) running Bridgething"

# u-boot: elle's mainline u-boot port runs from eMMC boot0/boot1 (signed
# FIP). superbird-bsp-image now builds it in-tree via the superbird-uboot
# recipe (BL33 -> FIP signed with the public spotify key -> paired with stock
# BL2 -> superbird-boot.bin in DEPLOY_DIR_IMAGE; flashed to boot0/boot1 with
# superbird-fip-tools / selfflash). TF-A's BL31 still comes prebuilt from
# amlogic-boot-fip, so we do not require amlogic-modern-boot.inc. The
# bridgething (stock-layout) images do not pull u-boot - only the bsp image
# adds it via EXTRA_IMAGEDEPENDS.

# Default rootfs types for the bridgething images (they still build the
# stock-Amlogic flashthing zip on this branch). superbird-bsp-image
# overrides this to "wic" for the GPT / mainline-u-boot layout.
IMAGE_FSTYPES = "ext4 tar.bz2"

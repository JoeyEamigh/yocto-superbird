#@TYPE: Machine
#@NAME: Spotify Car Thing (Superbird)
#@DESCRIPTION: Mainline-kernel Car Thing - Amlogic S905D2 (G12A family)

require conf/machine/include/amlogic-s905d2.inc

PREFERRED_PROVIDER_virtual/kernel = "linux-superbird"

# superbird-uboot and stock u-boot both PROVIDE virtual/bootloader; pin ours.
PREFERRED_PROVIDER_virtual/bootloader = "superbird-uboot"

KERNEL_IMAGETYPE = "Image"

KERNEL_DEVICETREE = "amlogic/meson-g12a-superbird.dtb"

# kernel + dtb + extlinux.conf land under /extlinux/ so extlinux.conf's relative
# KERNEL/FDT paths resolve against its own directory. logo.bmp sits at the root
# of boot_X vfat for u-boot's carthing_show_splash to fs_read at /logo.bmp.
IMAGE_BOOT_FILES = "Image;extlinux/Image meson-g12a-superbird.dtb;extlinux/meson-g12a-superbird.dtb extlinux.conf;extlinux/extlinux.conf logo.bmp;logo.bmp"

SERIAL_CONSOLES = "115200;ttyAML0"

MACHINE_FEATURES = "alsa bluetooth ext2 screen usbgadget usbhost vfat"

# static device facts surfaced into /etc/superbird by the device init recipe
SUPERBIRD_FCC_ID = "2AP3D"
SUPERBIRD_IC_ID = "24262"
SUPERBIRD_MODEL_NAME = "YX5H6679"
SUPERBIRD_DESCRIPTION = "Spotify Car Thing (Superbird) running Bridgething"

IMAGE_FSTYPES = "ext4 tar.bz2"

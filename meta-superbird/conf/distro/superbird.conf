require conf/distro/poky.conf

DISTRO = "superbird"
DISTRO_NAME = "Superbird"
DISTRO_VERSION = "0.1.0"

MAINTAINER = "Joey Eamigh <55670930+JoeyEamigh@users.noreply.github.com>"

INIT_MANAGER = "systemd"

DISTRO_FEATURES:append = " wayland opengl"
DISTRO_FEATURES:remove = "x11 3g nfc wifi vulkan pulseaudio multiarch nfs zeroconf debuginfod ptest"

PACKAGE_CLASSES = "package_ipk"

# weston: dev image opts in to vnc via the bbappend's split package; prod stays clean
PACKAGECONFIG:append:pn-weston = " headless vnc"

# pin aml back to 0.3.0 to satisfy weston-15's range; drop when weston widens
PREFERRED_VERSION_aml = "0.3.0"

# pin swupdate to the same release the daemon's swupdate-sys submodule tracks. bump together.
PREFERRED_VERSION_swupdate = "2025.12"

# chromium cast_shell variant; bbappend defines the PACKAGECONFIG
PACKAGECONFIG:pn-chromium-ozone-wayland = "cast-shell"

# --- identity / brand ---
SUPERBIRD_HOSTNAME ?= "superbird"
SUPERBIRD_MDNS_SERVICE_NAME ?= "Superbird"
SUPERBIRD_USB_GADGET_NAME ?= "Superbird"
SUPERBIRD_USB_GADGET_MANUFACTURER ?= "superbird"
SUPERBIRD_USB_GADGET_PRODUCT ?= "Superbird"
SUPERBIRD_BOOT_LOGO_NAME ?= "bootup.bmp"
SUPERBIRD_WESTON_SPLASH_IMAGE ?= "bridgething-splash.png"

# --- chromium kiosk ---
CHROMIUM_KIOSK_URL ?= "about:blank"
CHROMIUM_KIOSK_PROXY_SERVER ?= ""

# --- OTA range proxy ---
SUPERBIRD_OTA_RANGE_PORT ?= "8893"
SUPERBIRD_OTA_DELTA_URL_BASE ?= "http://127.0.0.1:${SUPERBIRD_OTA_RANGE_PORT}"

# --- partition geometry (MiB) ---
SUPERBIRD_ENV_PART_SIZE ?= "8"
SUPERBIRD_BOOT_PART_SIZE ?= "64"
SUPERBIRD_ROOT_PART_SIZE ?= "516"
SUPERBIRD_BANDAID_PART_SIZE ?= "192"

# wic's --fstype on root_X tracks the actual rootfs format so its size check matches.
SUPERBIRD_WKS_ROOTFS_FSTYPE ??= "${@'squashfs' if 'squashfs' in (d.getVar('IMAGE_FSTYPES') or '') else 'ext4'}"

# --- OTA headroom invariant ---
# floor for the smallest stock superbird eMMC variant. raise for larger media.
SUPERBIRD_MIN_EMMC_SIZE_MIB ?= "3600"
SUPERBIRD_OTA_HEADROOM_MARGIN_SIZE ?= "64"
SUPERBIRD_REQUIRE_OTA_HEADROOM ?= "1"

# --- boot policy ---
SUPERBIRD_SLOT_INITIAL_TRIES ?= "3"
SUPERBIRD_QUICK_BOOT ?= "0"

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Superbird Kiosk Example</title>
  <style>
    html, body { margin: 0; height: 100%; background: #111; color: #eee; font-family: sans-serif; }
    main { display: grid; place-items: center; height: 100%; text-align: center; padding: 0 32px; }
    h1 { font-size: 36px; margin: 0 0 16px; }
    p { margin: 0; opacity: 0.8; max-width: 560px; line-height: 1.4; }
    code { background: #222; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <main>
    <div>
      <h1>Superbird kiosk example</h1>
      <p>This page is shipped by <code>superbird-kiosk-default-webapp</code> and pointed at via the <code>CHROMIUM_KIOSK_URL</code> distro knob. Replace it with your own webapp recipe + URL.</p>
    </div>
  </main>
</body>
</html>

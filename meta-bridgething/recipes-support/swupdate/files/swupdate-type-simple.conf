# swupdate.service.d/type-simple.conf
#
# The packaged unit is Type=notify, but our swupdate is built
# without CONFIG_SYSTEMD (libsystemd headers don't end up in the
# sysroot in scarthgap meta-swupdate, the build fails). Without
# sd_notify, systemd holds the unit in 'activating' until its
# start timeout fires, which blocks multi-user.target and
# everything that depends on it (including our boot-confirm hook).
#
# Type=simple = systemd considers the unit active as soon as
# ExecStart is launched. swupdate's IPC sockets come up almost
# immediately so the lost ordering precision is fine for our
# use case.

[Service]
Type=simple

# Bridgething swupdate config fragment.
#
# CONFIG_BOOTLOADERHANDLER=y compiles in handlers/boot_handler.c,
# which registers the "uboot" and "bootenv" image handlers that
# core/parser.c:209 looks for before accepting a sw-description
# `bootenv:` block. Without it, swupdate has libubootenv linked
# in (CONFIG_UBOOT=y) but the parser still rejects in-manifest
# bootenv sections - the symbols in the parser check are handler
# names, not bootloader implementation flags.
#
# CONFIG_SYSTEMD=y makes swupdate (a) sd_notify READY=1 so
# swupdate.service can stay Type=notify cleanly, and (b) pick up
# the FDs systemd hands it via socket activation. Without it,
# swupdate's listener_create() falls through to its own
# unlink+bind cycle on /tmp/sockinstctrl + /tmp/swupdateprog,
# which races swupdate.socket's bind: kernel-level sockets stay
# alive in /proc/net/unix but the filesystem entries get unlinked
# and never re-created, so any IPC client (libswupdate from
# another process - the bridgething daemon) gets ENOENT on
# connect(). The python block in swupdate.inc auto-appends
# `systemd` to DEPENDS when this is set.
CONFIG_BOOTLOADERHANDLER=y
CONFIG_SYSTEMD=y

# Delta OTA via zchunk. The handler reads chunks from the inactive
# slot's source partition (DELTA_SOURCE_RAW), compares against the
# zck header in the .swu, fetches missing chunks via libcurl
# (CHANNEL_CURL is auto-selected), reassembles, then hands off to
# the chained raw handler for the partition write.
#
# CONFIG_DOWNLOAD pulls libcurl into the build dep set. CONFIG_DELTA
# itself only depends on HAVE_LIBCURL/HAVE_ZSTD/HAVE_ZCK env vars,
# and meta-swupdate's auto_depends only adds curl when
# CONFIG_DOWNLOAD or CONFIG_SURICATTA is set. CONFIG_ZSTD adds zstd
# and CONFIG_DELTA adds zchunk.
#
# CONFIG_HASH_VERIFY: zchunk validates per-chunk SHA256 internally,
# but enabling this also lets sw-description authors require an
# image-level hash (defense in depth for the assembled image
# before it lands in the raw write).
CONFIG_DOWNLOAD=y
CONFIG_HASH_VERIFY=y
CONFIG_ZSTD=y
CONFIG_DELTA=y
CONFIG_DELTA_SOURCE_RAW=y

[core]
backend=drm-backend.so
shell=desktop-shell.so
modules=bridgething-cursor-suppress.so
idle-time=0
require-input=false

[shell]
background-image=/usr/share/bridgething/bridgething-splash.png
background-type=centered
background-color=0xff000000
panel-position=top
panel-color=0xff000000
locking=false
animation=none
startup-animation=none
focus-animation=none
cursor-theme=blank

[output]
name=DSI-1
mode=480x800@60
transform=rotate-270

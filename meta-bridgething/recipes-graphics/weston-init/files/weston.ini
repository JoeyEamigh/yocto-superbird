[core]
backend=drm-backend.so
shell=desktop-shell.so
modules=bridgething-cursor-suppress.so
idle-time=0
require-input=false

[shell]
background-image=/usr/share/bridgething/bridgething-splash.png
background-type=centered
background-color=0xff000000
panel-position=top
panel-color=0xff000000
locking=false
animation=none
startup-animation=none
focus-animation=none
cursor-theme=blank

[output]
name=DSI-1
mode=480x800@60
transform=rotate-270

# vnc-backend.so creates a virtual head named "vnc" when loaded via
# --backends=...,vnc-backend.so on the dev image (verified in journal:
# "Output 'vnc' enabled with head(s) vnc"). The mirror-of key (added
# in weston 15) is specifically for the RDP/VNC/PipeWire backends to
# share a native DRM output's framebuffer instead of producing an
# independent virtual display: the remote head inherits DSI-1's
# modeline, refresh rate, and content, so a VNC client sees exactly
# what the panel shows. weston's own weston.ini(5) documents this as
# the intended pattern. clone-of (DRM-only, separate concept) does
# NOT do mirroring across backends.
#
# Harmless on prod: vnc-backend.so isn't loaded there (no
# bridgething-weston-dev.env shipped), so weston ignores the section
# for an output the active backend never produces.
[output]
name=vnc
mirror-of=DSI-1

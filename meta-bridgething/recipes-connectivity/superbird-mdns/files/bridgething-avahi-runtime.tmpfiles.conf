# Create the runtime directory for the dynamic bridgething avahi service
# file. The recipe ships /etc/avahi/services/bridgething.service as a
# symlink into this path; the bridgething daemon writes the file with
# the current nickname TXT at startup and on every change. World-readable
# so avahi-daemon (which runs as the avahi user) can still slurp the
# service file; the daemon owns the write side as root.
d /run/avahi         0755 root root -
d /run/avahi/services 0755 root root -

BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "bridgething"
BBFILE_PATTERN_bridgething = "^${LAYERDIR}/"
BBFILE_PRIORITY_bridgething = "20"

LAYERSERIES_COMPAT_bridgething = "scarthgap wrynose"

# meta-webkit master claims `scarthgap whinlatter` only - Igalia
# hasn't bumped to wrynose yet. Override locally so its layer.conf
# passes parsing on a wrynose-targeted poky tip. Drop this once
# upstream bumps. meta-browser already claims wrynose; oe-core
# ships clang 22 natively so no meta-clang dependency.
LAYERSERIES_COMPAT_webkit:append = " wrynose"

LAYERDEPENDS_bridgething = "core superbird webkit chromium-browser-layer"

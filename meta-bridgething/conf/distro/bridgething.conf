require conf/distro/superbird.conf

DISTRO = "bridgething"
DISTRO_NAME = "Bridgething"
DISTRO_VERSION = "0.1.4"

# --- identity / brand overrides ---
SUPERBIRD_HOSTNAME = "bridgething"
SUPERBIRD_MDNS_SERVICE_NAME = "Bridgething"
SUPERBIRD_USB_GADGET_NAME = "bridgething"
SUPERBIRD_USB_GADGET_MANUFACTURER = "bridgething"
SUPERBIRD_USB_GADGET_PRODUCT = "Bridgething Superbird"
SUPERBIRD_BOOT_LOGO_NAME = "bridgething-bootup.bmp"
SUPERBIRD_WESTON_SPLASH_IMAGE = "bridgething-splash.png"

# --- chromium kiosk: point at the daemon's loopback HTTP listener; route through the BT-RFCOMM SOCKS bridge ---
CHROMIUM_KIOSK_URL = "http://127.0.0.1:8891/"
CHROMIUM_KIOSK_PROXY_SERVER = "socks5://127.0.0.1:1080"

require conf/distro/poky.conf

DISTRO = "bridgething"
DISTRO_NAME = "Bridgething"
DISTRO_VERSION = "0.1.0"

MAINTAINER = "Joey Eamigh <55670930+JoeyEamigh@users.noreply.github.com>"

INIT_MANAGER = "systemd"

DISTRO_FEATURES:append = " wayland opengl"
# Strip distro features that have no business on this hardware:
#   - x11 / 3g / nfc: not present
#   - wifi: no wifi radio on the board; pulls cfg80211, mac80211,
#     wpa-supplicant, wireless-regdb, etc.
#   - vulkan: PanVK doesn't run on Mali-G31 (Bifrost v7) per Mesa,
#     pulls libvulkan + ICDs for ~30 MB of dead weight
#   - pulseaudio: we drive ALSA directly via the bridgething stack
#   - multiarch: pure aarch64 image, no 32-bit ABI compat needed
#   - nfs / zeroconf: no NFS mounts, no mDNS publishing
#   - debuginfod / ptest: debug symbol server lookup and ptest
#     harness are dev-host concerns, not on-target
#   - bluetooth: KEEP - Superbird BT is the primary host transport
DISTRO_FEATURES:remove = "x11 3g nfc wifi vulkan pulseaudio multiarch nfs zeroconf debuginfod ptest"

PACKAGE_CLASSES = "package_ipk"

# Mesa: poky's mesa.bb default PACKAGECONFIG already includes gallium,
# egl, gles, and gbm when DISTRO_FEATURES contains opengl. meta-meson
# adds lima + panfrost + libclc for the Mali drivers (build-time clc
# compilation only - no runtime cost).
#
# vulkan is intentionally not added: PanVK explicitly refuses to
# enumerate on Mali-G31 (Bifrost v7) without an env override. Shipping
# the PanVK ICD + lavapipe + loader costs ~30 MB for a driver the
# runtime treats as "not well-tested, broken."
#
# gallium-llvm is also intentionally not added: it would pull llvmpipe
# (CPU rasterization) into GALLIUMDRIVERS and add ~110 MB libLLVM at
# runtime, which a hardware GPU has no use for.

# Weston: default PACKAGECONFIG builds drm+wayland backends; add headless so
# we can run a compositor for GPU smoke tests before meson-drm / panel driver
# are probed. `vnc` adds the libneatvnc-backed VNC backend; the resulting
# vnc-backend.so is split into a `weston-vnc-backend` package by our
# bbappend (meta-bridgething/recipes-graphics/weston/weston_%.bbappend),
# and only the dev image RDEPENDS on it - prod's weston install never
# contains the .so or its neatvnc/libaml runtime deps.
PACKAGECONFIG:append:pn-weston = " headless vnc"

# meta-oe/wrynose ships aml 1.0.0 (with aml1.pc) but poky/wrynose's
# weston 15.0.0 hard-pins `dependency('aml', version: ['>= 0.3.0', '< 0.4.0'])`
# in libweston/backend-vnc/meson.build - and weston upstream main hasn't
# bumped either. Pin aml to v0.3.0 (which we ship in our own layer at
# meta-bridgething/recipes-graphics/aml/aml_0.3.0.bb). Drop this override
# the moment weston widens its aml version range.
PREFERRED_VERSION_aml = "0.3.0"

# Chromium: minimal flags. kiosk-mode wires --kiosk --no-first-run --incognito
# into the launcher (handy for stock-webapp). use-egl picks ANGLE on EGL.
# use-v4l2 routes hardware video decode through Amlogic v4l2-m2m (runtime
# only - no extra package deps). Drop upower (no battery) and
# proprietary-codecs (license risk + size).
PACKAGECONFIG:pn-chromium-ozone-wayland = "kiosk-mode use-egl use-v4l2"

# Cog: wayland backend + DBus remote-control. drm-backend dropped (we always
# run cog as a wayland client of weston). dbus needed so bridgething daemon
# can drive cog over the system bus instead of CDP.
PACKAGECONFIG:pn-cog = "wl dbus"

# WPE-WebKit: trimmed default. Drops UI features we don't use:
#   - accessibility (no screen reader / a11y; pulls atk + at-spi2-atk)
#   - jpegxl (still niche on the web in 2026 outside Apple ecosystems)
#   - hyphen (no word hyphenation; pulls libhyphen + dictionaries)
#   - mediastream (no getUserMedia; pulls gstreamer1.0-plugins-bad, ~35MB)
#   - speech-synthesis (no TTS; pulls flite)
#   - sysprof (profiling instrumentation we won't read)
# Keeps:
#   - avif (mainstream image format in 2026 - Cloudflare, Wikipedia, etc.)
#   - dfg-jit + jit (JS perf - Speedometer matters)
#   - gbm + gpu-process (Mali/Panfrost direct rendering, process isolation)
#   - libbacktrace (small, gives crash backtraces)
#   - journald (systemd integration, already in DISTRO_FEATURES)
#   - mediasource (progressive media loading; might break sites if dropped)
#   - remote-inspector (W3C WebDriver / devtools entry point)
#   - unified-builds (build-time only - faster compile)
#   - video + webaudio (Spotify could use Web Audio for visualizations;
#     gstreamer-base is already pulled by webaudio so video is essentially free)
#   - woff2 (Spotify uses webfonts)
#   - wpe-legacy-api (cog still requires it)
# Net savings vs default: ~45-65 MB rootfs, mostly gst-plugins-bad.
PACKAGECONFIG:pn-wpewebkit = " \
    avif \
    dfg-jit \
    gbm \
    gpu-process \
    jit \
    libbacktrace \
    journald \
    mediasource \
    remote-inspector \
    unified-builds \
    video \
    webaudio \
    woff2 \
    wpe-legacy-api \
"

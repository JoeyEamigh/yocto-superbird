# /etc/bridgething-als.conf - runtime knobs for bridgething-als.
# Edit, then `systemctl restart bridgething-als` to pick up changes.

# Raw photodiode count where brightness pegs at max_brightness.
# Smaller = more sensitive. The TMD2772 in the Superbird enclosure has
# a lot of cover-glass attenuation; raw rarely exceeds ~500 even with
# a flashlight an inch from the sensor, so 500 is the calibrated max.
# Try 200 if you want even more sensitivity, 1000 if too eager.
ALS_RAW_AT_MAX=500

# Lowest brightness the daemon will write. With brightness-levels
# = <0 8 16 32 64 96 128 160 192 224 255> and num-interpolated-steps
# = 16 (so max=160), the cube/scale math means low indices interpolate
# to single-digit PWM values that fall below the LP8556 LED driver's
# start threshold and read as "panel off." 64 ≈ 25% PWM duty (well
# above the cutoff) and gives us a sensible "dim but visible" floor.
# Real off should be an explicit bl_power write, not duty-too-low.
ALS_MIN_BRIGHTNESS=64

# Poll interval in milliseconds. 200ms = 5Hz update rate. Faster wastes
# CPU and stresses the PWM controller; slower feels laggy.
ALS_POLL_MS=200

# EMA smoothing factor (0..1). Lower = smoother but laggier.
# 0.20 = ~80% of a step change in 1 second at 200ms poll.
ALS_EMA_ALPHA=0.20

# Brightness-write hysteresis. Don't update the backlight unless the
# new value differs by at least this many ticks. Reduces PWM glitches
# from rapid micro-changes.
ALS_HYSTERESIS=2

# How many consecutive raw=0 samples to ignore before accepting "dark".
# The tsl2772 driver returns 0 when the chip's ADC integration cycle
# isn't done - these spurious zeros happen at any light level. After
# this many in a row, treat it as genuine darkness. 5 ≈ 1 second at
# 200ms poll. Bump higher if cover-up tests show false dimming.
ALS_ZERO_STREAK_LIMIT=5

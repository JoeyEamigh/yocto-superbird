# /etc/bridgething-als.conf - runtime knobs for bridgething-als.
# Edit, then `systemctl restart bridgething-als` to pick up changes.

# Raw photodiode count where brightness pegs at max_brightness.
# Calibrated for ALS_GAIN=16 + ALS_INTEGRATION_TIME=0.100. At those
# chip settings typical room ambient reads tens of counts and direct
# daylight reads in the low thousands; 1500 puts a bright window at
# ~95% PWM and outdoor daylight at the ceiling. Lower for sensitivity,
# higher to leave more headroom before the curve clips.
ALS_RAW_AT_MAX=1500

# Lowest brightness the daemon will write. With brightness-levels
# = <0 8 16 32 64 96 128 160 192 224 255> and num-interpolated-steps
# = 16 (max=160), 16/160 ~= 5% PWM, well above the LP8556 cutoff and
# stable enough that UART writes do not produce visible flicker. Real
# off should be an explicit bl_power=4 write, not duty-too-low.
ALS_MIN_BRIGHTNESS=16

# Raw counts at or below this clamp the target directly to MIN. Stops
# noise-floor jitter in dark rooms from riding the log curve.
ALS_DIM_KNEE=3

# Median window length. 11 samples at 200 ms poll = 2.2 s of light
# history; rejects single-sample outliers (driver-returned zeros,
# brief shadows, hand-passing flashes) without lagging perceptibly
# on real ambient changes.
ALS_MEDIAN_WINDOW=11

# Ease toward target by this fraction of the remaining distance per
# tick (with a min step of 1). 0.15 at 5 Hz settles a large swing in
# ~1.5-2 s; small swings finish in single ticks. Replaces hysteresis.
ALS_EASE_PCT=0.15

# Poll interval in milliseconds. 200 ms = 5 Hz update rate.
ALS_POLL_MS=200

# TMD2772 ADC integration time in seconds. The mainline tsl2772 driver
# defaults to ~0.00273 s (one cycle, ~1024 max counts) which makes the
# chip near-blind for room ambient. 0.100 s gives ~37 cycles (~37888
# max counts), enough resolution at the dim end without saturating in
# direct sun at the configured gain.
ALS_INTEGRATION_TIME=0.100

# TMD2772 analog gain. Available: 1, 8, 16, 120. 16 with 0.100 s
# integration produces tens of counts at desk light and low thousands
# at bright window. 120 saturates too easily near direct sun; 8 loses
# resolution at the dim end. Note: the driver's calibscale readback
# is broken in mainline (always reports 1) but writes do take effect
# on the chip - verify by checking raw counts, not the readback.
ALS_GAIN=16

# Drop-in shipped only on the dev image (via bridgething-daemon-dev-config,
# pulled in by packagegroup-bridgething-dev). Two effects:
#
#   1. Override the prod Environment=RUST_LOG with the trace-level set
#      bridgething developers want. Drop-ins are loaded after the main
#      unit and last-assignment-wins on per-variable Environment= lines,
#      so this supersedes the prod value regardless of whether systemd
#      execs the in-rootfs binary at /usr/libexec/bridgething or the
#      push-daemon overlay at /opt/bridgething/daemon/bridgething - both
#      inherit unit env.
#
#   2. Mirror stdout/stderr to /dev/console in addition to the journal so
#      logs stream out the UART console (ttyAML0) live, not just via
#      `journalctl -u bridgething`. journal+console writes plain text via
#      systemd-journald, not printk, so kernel.printk_ratelimit doesn't
#      drop trace output and the serial-getty on ttyAML0 keeps working
#      (writes interleave with, don't fight, the getty).

[Service]
Environment=RUST_LOG=bridgething=trace,bridgething::ws::connection::send=debug,bridgething::net=debug,libbridgething=trace,bridgething-iap2=trace,bridgething-mfi=trace
StandardOutput=journal+console
StandardError=journal+console

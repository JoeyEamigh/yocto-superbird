# dev-image drop-in: trace logs + uart mirror + persistent trace file on the
# data partition. drop-ins last-wins on the main unit's Environment= and
# StandardOutput= keys.

[Service]
Environment=RUST_LOG=bridgething=trace,bridgething::ws::connection::send=debug,bridgething::net=debug,libbridgething=trace,bridgething_iap2=trace,bridgething_mfi=trace
Environment=BRIDGETHING_TRACE_DIR=/var/lib/bridgething/logs
StandardOutput=journal+console
StandardError=journal+console

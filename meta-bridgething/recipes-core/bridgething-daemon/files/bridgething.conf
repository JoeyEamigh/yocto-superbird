# Bridgething directory layout.
#
# /var/bridgething/webapps/ holds user-installable webapp bundles on the
# data partition. The bridgething daemon writes here when handling a
# Webapps::Install message and reads here when serving the active webapp.
#
# /var/lib/bridgething/state/ holds the daemon's persistent state DB on
# the settings partition. Settings is shared between system_a and system_b
# so paired devices, last-active webapp, and the kv-storage map survive
# bootslot swaps + OTA upgrades.

d /var/bridgething              0755 root root - -
d /var/bridgething/webapps      0755 root root - -
d /var/lib/bridgething          0755 root root - -
d /var/lib/bridgething/state    0755 root root - -

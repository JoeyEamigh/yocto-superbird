# /etc/bridgething-rotary.conf - runtime knobs for bridgething-rotary.
# Edit, then `systemctl restart bridgething-rotary` to pick up changes.

# Hi-res wheel ticks emitted per kernel rotary detent. The X11/wayland
# convention is 120 ticks per real-mouse-wheel "click"; chromium and
# weston scale scroll velocity off this number. Lower (e.g., 60) =
# slower scroll per detent. Higher (e.g., 240) = faster.
ROTARY_HIRES_PER_DETENT=120

# Legacy REL_HWHEEL ticks per detent. Compositors that don't read the
# hi-res axis fall back to this. 1 = one notch per detent, which is
# what real wheel mice emit. Increase only if a specific client wants
# coarser scroll on the legacy axis.
ROTARY_LEGACY_PER_DETENT=1

# 1 = invert direction (clockwise scrolls left), 0 = default
# (clockwise scrolls right). Sign is whatever the kernel rotary driver
# emits; flipping here is cheaper than rebuilding the kernel patch.
ROTARY_INVERT=0

# Override the device path the daemon grabs. Empty / unset = scan
# /dev/input/event* for a device with REL_HWHEEL but no REL_X/Y, which
# uniquely identifies the rotary on this hardware. Set explicitly only
# if a future board grows a second REL_HWHEEL-only input.
# ROTARY_DEVICE=/dev/input/event2

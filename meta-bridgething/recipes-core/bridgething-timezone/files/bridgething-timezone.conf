# Persistent state directory for the timezone selection. /etc is on
# read-only squashfs, so /etc/localtime cannot be replaced in place by
# systemd-timedated; it lives here on the writable settings partition
# instead. /etc/localtime + /etc/timezone are shipped as symlinks into
# this directory.
d /var/lib/timezone 0755 root root -

# Initial localtime symlink, replaced by systemd-timedated when the
# user selects a zone. UTC is the safe default until then.
L+ /var/lib/timezone/localtime - - - - /usr/share/zoneinfo/UTC

# Initial /etc/timezone-equivalent value. Plain text, single line, no
# trailing whitespace beyond the newline.
f /var/lib/timezone/timezone 0644 root root - UTC

# Drop-in for android-tools-adbd.service that integrates the upstream
# meta-oe adbd unit with bridgething's composite USB gadget. The default
# unit assumes an adbd-only gadget that android-gadget-setup creates and
# tears down around adbd; in our setup bridgething-usb-gadget already
# composed the multi-function gadget (ncm.usb0 + ffs.adb) and is
# waiting for adbd to write FFS ep0 descriptors before the UDC bind.
#
# Sequencing:
#   1. bridgething-usb-gadget.service mounts FFS, creates ffs.adb,
#      links it into c.1, but does NOT bind /sys/class/udc/<udc>.
#   2. adbd starts, opens /dev/usb-ffs/adb/ep0, writes the ADB
#      class=ff/sub=42/proto=01 descriptors.
#   3. ExecStartPost echoes the UDC name, exposing the now-fully-described
#      composite gadget to the host.

[Unit]
ConditionPathExists=
ConditionPathExists=/etc/usb-debugging-enabled
After=bridgething-usb-gadget.service
Requires=bridgething-usb-gadget.service

[Service]
ExecStartPre=
# Retry the UDC bind for up to ~10s. The bind only succeeds once adbd has
# opened /dev/usb-ffs/adb/ep0 and written its USB descriptors there;
# before that the FFS slot's state is "incomplete" and configfs returns
# EBUSY. Polling for ep1/ep2 isn't a reliable signal because the kernel
# keeps those nodes around across adbd exits, so they may be present
# before this run's adbd has caught up. Just retry the bind itself - it
# becomes a no-op once it has succeeded.
ExecStartPost=/bin/sh -c 'UDC_NAME=$(ls /sys/class/udc | head -n 1); for i in $(seq 1 100); do printf "%%s" "$UDC_NAME" > /sys/kernel/config/usb_gadget/bridgething/UDC 2>/dev/null && exit 0; sleep 0.1; done; exit 1'
ExecStop=/bin/sh -c 'echo "" > /sys/kernel/config/usb_gadget/bridgething/UDC'

# Local-source override for bridgething recipes. Lets you build the dev
# image from an unpushed bridgething working tree instead of the github
# checkout listed in each recipe's SRC_URI.
#
# Usage:
#   1. Copy this file to kas/bridgething-local.yml (gitignored):
#        cp kas/bridgething-local.example.yml kas/bridgething-local.yml
#   2. Edit BRIDGETHING_LOCAL below to point at your bridgething checkout.
#      That path is the only host-specific value; the Justfile reads it
#      back out of this file and bind-mounts it into the kas container.
#   3. Build with `just build bridgething-local` (instead of the usual
#      `just build` / `just build bridgething`).
#
# Mechanic: bitbake's externalsrc.bbclass replaces do_fetch/do_unpack
# with "use this host path as ${S}". EXTERNALSRC_BUILD redirects cargo's
# target/ into the bitbake workdir so target/ never lands inside your
# bridgething working tree. EXTERNALSRC_SYMLINKS = "" stops externalsrc
# from dropping oe-workdir / oe-logs symlinks into the source tree -
# they'd point at container-internal paths and would just clutter
# `git status` on the bridgething repo.

header:
  version: 18
  includes:
    - repo: yocto-superbird
      file: kas/bridgething.yml

local_conf_header:
  externalsrc: |
    BRIDGETHING_LOCAL = "/path/to/your/bridgething"

    INHERIT += "externalsrc"

    EXTERNALSRC:pn-bridgething-daemon = "${BRIDGETHING_LOCAL}"
    EXTERNALSRC_BUILD:pn-bridgething-daemon = "${WORKDIR}/build"

    EXTERNALSRC:pn-bridgething-hub-webapp = "${BRIDGETHING_LOCAL}"
    EXTERNALSRC_BUILD:pn-bridgething-hub-webapp = "${WORKDIR}/build"

    EXTERNALSRC:pn-bridgething-mfi-proxy = "${BRIDGETHING_LOCAL}"
    EXTERNALSRC_BUILD:pn-bridgething-mfi-proxy = "${WORKDIR}/build"

    # externalsrc.bbclass still calls bb.fetch.get_hashvalue() against SRC_URI even
    # though the actual build pulls from BRIDGETHING_LOCAL. Drop the github://
    # fetch so a private repo or offline host doesn't block dev iteration; the
    # local file:// entries kept by the recipe still resolve fine.
    SRC_URI:remove:pn-bridgething-daemon = "gitsm://github.com/JoeyEamigh/bridgething.git;protocol=https;branch=main;destsuffix=${BP}"
    SRC_URI:remove:pn-bridgething-hub-webapp = "git://github.com/JoeyEamigh/bridgething.git;protocol=https;branch=main;destsuffix=${BP}"
    SRC_URI:remove:pn-bridgething-mfi-proxy = "git://github.com/JoeyEamigh/bridgething.git;protocol=https;branch=main;destsuffix=${BP}"
    SRCREV:pn-bridgething-daemon = "INVALID"
    SRCREV:pn-bridgething-hub-webapp = "INVALID"
    SRCREV:pn-bridgething-mfi-proxy = "INVALID"

    EXTERNALSRC_SYMLINKS = ""

    CARGO_BUILD_FLAGS:append:pn-bridgething-daemon = " --config profile.release.lto=false --config profile.release.codegen-units=32"
    CARGO_BUILD_FLAGS:append:pn-bridgething-mfi-proxy = " --config profile.release.lto=false --config profile.release.codegen-units=32"

repos:
  yocto-superbird:
    path: .
    layers:
      meta-superbird:
      meta-bridgething:
